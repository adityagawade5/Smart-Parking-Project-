<!DOCTYPE html>
<html>
<head>
<title>Parking Ticket</title>

<style>
body{
margin:0;
font-family:Arial;
background:url("main-bg.jpg") no-repeat center center fixed;
background-size:cover;
}

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
z-index:-1;
}

.container{
width:450px;
margin:80px auto;
background:white;
padding:30px;
border-radius:12px;
}

.ticket{
background:#f4f4f4;
padding:20px;
border-radius:10px;
line-height:1.6;
}
</style>
</head>

<body>

<div class="container">

<h2>🎫 Parking Ticket</h2>

<div class="ticket" id="ticketDetails"></div>

<button onclick="goHome()">Go Home</button>

</div>

<script>

let bookings = JSON.parse(localStorage.getItem("bookings")) || [];
let latest = bookings[bookings.length - 1];

document.getElementById("ticketDetails").innerHTML = `
<b>Booking ID:</b> ${latest.id}<br>
<b>Mall:</b> ${latest.mall}<br>
<b>Date:</b> ${latest.date}<br>
<b>Time:</b> ${latest.time}:00<br>
<b>Vehicle:</b> ${latest.vehicle}<br>
<b>Slots:</b> ${latest.slots.join(", ")}<br>
<b>Amount Paid:</b> ₹${latest.amount}<br>
<b>User UPI:</b> ${latest.userUpi}<br>
<b>Status:</b> ${latest.status}
`;

function goHome(){
window.location.href="home.html";
}

</script>

</body>
</html>
