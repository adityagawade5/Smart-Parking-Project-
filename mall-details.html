<!DOCTYPE html>
<html>
<head>
<title>Mall Slot Management</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

.header{
background:#1a1a1a;
padding:20px 40px;
}

.container{
padding:30px;
}

.controls{
background:#1f1f1f;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

input,select{
padding:8px;
margin-top:10px;
border-radius:6px;
border:none;
}

button{
padding:8px 15px;
border:none;
border-radius:6px;
cursor:pointer;
}

.check-btn{
background:#00bfff;
color:white;
}

.cancel-btn{
background:red;
color:white;
}

.back-btn{
background:#28a745;
color:white;
margin-top:20px;
}

.card{
background:#1f1f1f;
padding:15px;
margin-top:15px;
border-radius:10px;
}

.summary{
display:flex;
gap:20px;
margin-top:20px;
}

.summary-box{
background:#1f1f1f;
padding:15px;
border-radius:10px;
flex:1;
text-align:center;
}

</style>

</head>

<body>

<script>
if(localStorage.getItem("role") !== "admin"){
window.location.href="login.html";
}
</script>

<div class="header">
<h2 id="mallTitle"></h2>
</div>

<div class="container">

<div class="controls">

<h3>Select Date</h3>
<input type="date" id="dateInput">

<h3>Select Vehicle</h3>

<select id="vehicleType">
<option value="Two Wheeler">Two Wheeler</option>
<option value="Four Wheeler">Four Wheeler</option>
</select>

<br><br>

<button class="check-btn" onclick="checkSlots()">Check Slots</button>

</div>

<div class="summary" id="summary"></div>

<h3 style="margin-top:30px;">Bookings</h3>

<div id="bookingList"></div>

<button class="back-btn" onclick="goBack()">Back</button>

</div>

<script>

let mallName = localStorage.getItem("selectedMallAdmin");

document.getElementById("mallTitle").innerText =
"Slot Management - " + mallName;

let bookings = JSON.parse(localStorage.getItem("bookings")) || [];

const mallSlots = {

"Phoenix Mall of Millennium":50,
"ElPro City Square Mall":40,
"Phoenix Market City Pune":60,
"Amanora Mall":40

};

function checkSlots(){

let selectedDate = document.getElementById("dateInput").value;
let vehicle = document.getElementById("vehicleType").value;

if(!selectedDate){
alert("Please select date");
return;
}

let totalSlots = mallSlots[mallName] || 50;

/* FIX 1 – show only booked slots */

let filtered = bookings.filter(b => {

let bookingDate = new Date(b.date).toISOString().split("T")[0];

return (

b.mall?.toLowerCase().trim() === mallName?.toLowerCase().trim() &&
bookingDate === selectedDate &&
b.vehicle === vehicle &&
b.status === "Booked"

);

});

let booked = filtered.length;
let available = totalSlots - booked;

document.getElementById("summary").innerHTML =

`
<div class="summary-box">
<h3>Total Slots</h3>
<p>${totalSlots}</p>
</div>

<div class="summary-box">
<h3>Booked</h3>
<p>${booked}</p>
</div>

<div class="summary-box">
<h3>Available</h3>
<p>${available}</p>
</div>
`;

let html="";

filtered.forEach((b,index)=>{

let realIndex = bookings.findIndex(x=>x.id === b.id);

let slotList = (b.slots && b.slots.length)
? b.slots.join(", ")
: "No Slot Data";

html +=

`
<div class="card">

<b>Booking ID:</b> ${b.id}<br>
<b>User:</b> ${b.user || "Unknown"}<br>
<b>Vehicle:</b> ${b.vehicle}<br>
<b>Slots:</b> ${slotList}<br>
<b>Amount:</b> ₹${b.amount}<br>
<b>UPI ID:</b> ${b.userUpi || "Not Entered"}<br>

<button class="cancel-btn" onclick="adminCancel(${realIndex})">
Cancel Booking
</button>

</div>

`;

});

document.getElementById("bookingList").innerHTML =
html || "No bookings for this date";

}

/* FIX 2 – cancel booking */

function adminCancel(index){

let confirmCancel = confirm("Cancel this booking?");

if(!confirmCancel) return;

bookings[index].status = "Cancelled";
bookings[index].cancelReason = "Cancelled by Admin";

localStorage.setItem("bookings", JSON.stringify(bookings));

alert("Booking Cancelled");

/* refresh slot data */
checkSlots();

}

function goBack(){
window.location.href="admin.html";
}

</script>

</body>
</html>
