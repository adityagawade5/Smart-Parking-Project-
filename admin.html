<!DOCTYPE html>
<html>
<head>
<title>Smart Parking - Admin Dashboard</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

.header{
padding:20px;
background:#1a1a1a;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{
padding:30px;
}

.section{
margin-bottom:40px;
}

.mall-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.mall-card{
background:#1f1f1f;
padding:15px;
border-radius:10px;
cursor:pointer;
}

.mall-card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:10px;
}

.card{
background:#1f1f1f;
padding:15px;
margin-top:15px;
border-radius:10px;
}

button{
padding:8px 15px;
border:none;
border-radius:5px;
cursor:pointer;
}

.logout-btn{
background:red;
color:white;
}

</style>

</head>

<body>

<script>

if(localStorage.getItem("role") !== "admin"){
window.location.href="login.html";
}

</script>

<div class="header">
<h2>Admin Dashboard</h2>
<button class="logout-btn" onclick="logout()">Logout</button>
</div>

<div class="container">

<!-- Mall Overview -->

<div class="section">
<h2>Mall Overview</h2>
<div class="mall-grid" id="mallGrid"></div>
</div>


<!-- Registered Users -->

<div class="section">
<h2>Registered Users</h2>
<div id="userList"></div>
</div>


<!-- Cancelled Bookings -->

<div class="section">
<h2>Cancelled Bookings</h2>
<div id="cancelList"></div>
</div>

</div>


<script>

let bookings = JSON.parse(localStorage.getItem("bookings")) || [];
let users = JSON.parse(localStorage.getItem("users")) || [];

const malls = [

{
name:"Phoenix Mall of Millennium",
image:"phoenix-millennium.jpg",
totalSlots:50
},

{
name:"ElPro City Square Mall",
image:"elpro.jpg",
totalSlots:40
},

{
name:"Phoenix Market City Pune",
image:"phoenix-marketcity.jpg",
totalSlots:60
},

{
name:"Amanora Mall",
image:"amanora.jpg",
totalSlots:40
}

];


/* Mall Overview */

let mallHTML="";

malls.forEach(mall=>{

let booked = bookings.filter(b=>b.mall===mall.name && b.status==="Booked").length;

let available = mall.totalSlots - booked;

mallHTML += `

<div class="mall-card" onclick="openMall('${mall.name}')">

<img src="${mall.image}">

<h3>${mall.name}</h3>

<p>Booked: ${booked}</p>

<p>Available: ${available}</p>

</div>

`;

});

document.getElementById("mallGrid").innerHTML = mallHTML;


/* Registered Users */

let userHTML="";

users.forEach(u=>{

userHTML += `

<div class="card">

<b>Email:</b> ${u.email}

</div>

`;

});

document.getElementById("userList").innerHTML = userHTML || "No users";


/* Cancelled Bookings */

let cancelHTML="";

bookings
.filter(b=>b.status==="Cancelled")
.forEach(b=>{

cancelHTML += `

<div class="card">

<b>Booking ID:</b> ${b.id}<br>

<b>User:</b> ${b.user}<br>

<b>Mall:</b> ${b.mall}<br>

<b>Date:</b> ${b.date}<br>

<b>Amount:</b> ₹${b.amount}<br>

<b>UPI ID:</b> ${b.userUpi || "Not Entered"}<br>

<b>Cancel Reason:</b> ${b.cancelReason || "No Reason"}

</div>

`;

});

document.getElementById("cancelList").innerHTML =
cancelHTML || "No Cancelled Bookings";


/* Open Mall Details */

function openMall(mallName){

localStorage.setItem("selectedMallAdmin", mallName);

window.location.href="mall-details.html";

}


/* Logout */

function logout(){

localStorage.removeItem("currentUser");
localStorage.removeItem("role");

window.location.href="login.html";

}

</script>

</body>

</html>
